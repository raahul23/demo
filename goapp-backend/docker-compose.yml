services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: goapp_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: goapp
      POSTGRES_USER: goapp
      POSTGRES_PASSWORD: goapp_secret
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U goapp -d goapp']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: goapp_redis
    restart: unless-stopped
    command: redis-server --requirepass goapp_redis_secret
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', 'goapp_redis_secret', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
