name: goapp
description: "GoApp is a modern rider mobility app for booking bike, scooty, car, premium rides, parcel delivery, and women-safe rides with real-time tracking, smart payments, and reward coins."

publish_to: 'none' # Remove this line if you wish to publish to pub.dev


version: 1.0.0+1

environment:
  sdk: ^3.10.7


dependencies:
  flutter:
    sdk: flutter


  cupertino_icons: ^1.0.8
  flutter_bloc: ^9.1.1
  get_it: ^9.2.0
  dio: ^5.9.1
  equatable: ^2.0.8
  connectivity_plus: ^7.0.0
  shared_preferences: ^2.3.2
  flutter_dotenv: ^5.2.1
  sms_autofill: ^2.4.0
  google_maps_flutter: ^2.6.1
  geolocator: ^13.0.1
  fake_async: ^1.3.3
  flutter_secure_storage: ^9.2.2
  device_preview: ^1.2.0
  firebase_core: ^4.4.0
  firebase_messaging: ^16.0.2
  socket_io_client: ^2.0.3+1

dev_dependencies:
  flutter_test:
    sdk: flutter

 
  flutter_lints: ^6.0.0
  geolocator_platform_interface: ^4.0.3



flutter:

  uses-material-design: true

  assets:
    - assets/env/dev.env
    - assets/env/test.env
    - assets/env/prod.env
    - assets/maps/map_style.json
    - assets/maps/booking_map_style.json
    - assets/images/maps/bike.png
    - assets/images/payment/
    - assets/images/activity/
    - assets/images/login/


  fonts:
    - family: Saira
      fonts:
         - asset: assets/fonts/saira/Saira-Regular.ttf
         - asset: assets/fonts/saira/Saira-Medium.ttf
           weight: 500
         - asset: assets/fonts/saira/Saira-SemiBold.ttf
           weight: 600
         - asset: assets/fonts/saira/Saira-Bold.ttf
           weight: 700
    - family: Inter
      fonts:
         - asset: assets/fonts/inter/Inter-Regular.ttf
         - asset: assets/fonts/inter/Inter-Medium.ttf
           weight: 500
         - asset: assets/fonts/inter/Inter-SemiBold.ttf
           weight: 600
         - asset: assets/fonts/inter/Inter-Bold.ttf
           weight: 700

